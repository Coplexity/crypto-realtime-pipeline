  consumer-redis:
    <<: *kafka-python-image
    container_name: consumer-redis
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - KAFKA_BROKER=kafka:9092
      - KAFKA_TOPIC=crypto_kline_1m
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=123456
    command: ["python", "redis_consumer.py"]

  historical-fetcher:
    <<: *kafka-python-image
    container_name: historical-fetcher
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - MONGO_URI=mongodb://mongodb:27017/
      - MONGO_DB=CRYPTO
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=123456
      - YEARS_BACK=1
      - RESUME_FROM_EXISTING=true
    command: ["python", "binance_history_fetcher.py"]

networks:
  bigdata-network:
    name: bigdata
    driver: bridge

volumes:
  mongodb_data:
