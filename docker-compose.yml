  producer-kline:
    <<: *kafka-python-image
    container_name: producer-kline
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - KAFKA_BROKER=kafka:9092
      - KAFKA_TOPIC=crypto_kline_1m
    command: ["python", "binance_producer.py"]

  producer-orderbook:
    <<: *kafka-python-image
    container_name: producer-orderbook
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - KAFKA_BROKER=kafka:9092
      - KAFKA_TOPIC_ORDERBOOK=crypto_orderbook
      - KAFKA_TOPIC_TRADES=crypto_trades
    command: ["python", "binance_orderbook_trades_producer.py"]
  
