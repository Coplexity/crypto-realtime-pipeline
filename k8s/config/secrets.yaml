apiVersion: v1
kind: Secret
metadata:
  name: crypto-secrets
  namespace: crypto-system
  labels:
    app: crypto-system
    component: security
type: Opaque
data:
  # 1. MongoDB Credentials
  # echo -n 'admin' | base64 -> YWRtaW4=
  # echo -n 'admin123' | base64 -> YWRtaW4xMjM=
  MONGO_USER: YWRtaW4=
  MONGO_PASSWORD: YWRtaW4xMjM=

  # 2. Redis Credentials
  # echo -n 'redis123' | base64 -> cmVkaXMxMjM=
  REDIS_PASSWORD: cmVkaXMxMjM=

  # 3. Binance API Key cho Data Ingestion
  # Thay thế giá trị này bằng API key thật của bạn đã encode base64
  BINANCE_API_KEY: eW91ci1yZWFsLWJpbmFuY2UtYXBpLWtleS1oZXJl

  # 4. Airflow Fernet Key (Dùng để mã hóa connection passwords trong Airflow DB)
  # echo -n '46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLt0nFe0I=' | base64
  FERNET_KEY: TkRaQ1MwcHZVbWwzVUZCUGVIRTBUaFpPYmtsdFRtVndTMFptT0RkWFJuZE1kREJ1Um1Vd1NROQ==

  # 5. Grafana Admin Password
  # echo -n 'admin123' | base64 -> YWRtaW4xMjM=
  GRAFANA_PASSWORD: YWRtaW4xMjM=