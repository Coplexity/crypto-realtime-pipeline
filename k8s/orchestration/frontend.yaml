apiVersion: apps/v1
kind: Deployment
metadata:
  name: nextjs-frontend
  namespace: crypto-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nextjs-frontend
  template:
    metadata:
      labels:
        app: nextjs-frontend
    spec:
      containers:
      - name: frontend
        image: crypto-frontend:v1
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
        env:
        # Nếu Next.js gọi API từ Server-side (SSR)
        - name: API_URL
          value: "http://fastapi-backend:8000"
        # Nếu Next.js gọi API từ Client-side (Trình duyệt của bạn)
        - name: NEXT_PUBLIC_API_URL
          value: "http://localhost:8000"
---
apiVersion: v1
kind: Service
metadata:
  name: nextjs-frontend
  namespace: crypto-system
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
  selector:
    app: nextjs-frontend