apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: airflow-logs-pvc
  namespace: crypto-system
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: airflow-env
  namespace: crypto-system
data:
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://airflow:airflow@postgres:5432/airflow"
  AIRFLOW__CORE__EXECUTOR: "LocalExecutor"
  AIRFLOW__CORE__FERNET_KEY: "46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLt0nFe0I="
  AIRFLOW__WEBSERVER__SECRET_KEY: "mysecretkey"
---
apiVersion: v1
kind: Service
metadata:
  name: airflow-webserver
  namespace: crypto-system
spec:
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: airflow-webserver
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-webserver
  namespace: crypto-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-webserver
  template:
    metadata:
      labels:
        app: airflow-webserver
    spec:
      containers:
      - name: webserver
        image: crypto-airflow:v1
        imagePullPolicy: Never
        envFrom:
          - configMapRef:
              name: airflow-env
        command: ["airflow", "webserver"]
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: airflow-logs
          mountPath: /opt/airflow/logs
      volumes:
      - name: airflow-logs
        persistentVolumeClaim:
          claimName: airflow-logs-pvc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-scheduler
  namespace: crypto-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-scheduler
  template:
    metadata:
      labels:
        app: airflow-scheduler
    spec:
      containers:
      - name: scheduler
        image: crypto-airflow:v1
        imagePullPolicy: Never
        envFrom:
          - configMapRef:
              name: airflow-env
        command: ["airflow", "scheduler"]
        volumeMounts:
        - name: airflow-logs
          mountPath: /opt/airflow/logs
      volumes:
      - name: airflow-logs
        persistentVolumeClaim:
          claimName: airflow-logs-pvc
