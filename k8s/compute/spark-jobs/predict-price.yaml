# ==========================================
# File: k8s/compute/spark-jobs/predict-price.yaml
# Spark ML Job: Chạy dự đoán giá (Inference)
# ==========================================
apiVersion: "sparkoperator.k8s.io/v1beta2"
kind: SparkApplication
metadata:
  name: spark-ml-predict
  namespace: crypto-system
spec:
  type: Python
  mode: cluster
  image: "your-registry/spark-batch:v1"
  imagePullPolicy: Always
  mainApplicationFile: "local:///opt/spark-jobs/batch/predict_price.py"
  sparkVersion: "3.4.1"
  restartPolicy:
    type: Never

  deps:
    packages:
      - "org.mongodb.spark:mongo-spark-connector_2.12:10.1.1"

  driver:
    cores: 1
    coreLimit: "1200m"
    memory: "1024m"
    serviceAccount: spark-crypto-sa
    volumeMounts:
      - name: ml-models-vol
        mountPath: /opt/spark-data/models

  executor:
    cores: 1
    instances: 2 # Inference thường nhẹ hơn Training, không cần quá nhiều instance
    memory: "2048m"
    volumeMounts:
      - name: ml-models-vol
        mountPath: /opt/spark-data/models

  volumes:
    - name: ml-models-vol
      persistentVolumeClaim:
        claimName: spark-ml-models-pvc